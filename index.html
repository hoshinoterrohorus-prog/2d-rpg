<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectre AI - ShoreKeeper</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #0f172a; color: #e2e8f0; margin: 0; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #334155; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #1e293b; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
        button:hover { background: #7dd3fc; }
    </style>
</head>
<body>

    <h2>Spectre AI</h2>
    <div id="chat-box"></div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Tanyakan sesuatu pada ShoreKeeper...">
        <button onclick="sendMessage()">Kirim</button>
    </div>

    <script>
        // Fungsi Suara ShoreKeeper
        function speakResponse(text) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            
            speech.lang = 'id-ID';
            speech.rate = 0.85;  // Kecepatan tenang
            speech.pitch = 1.05; // Sedikit lembut
            speech.volume = 1;

            // Mencoba menggunakan suara Google jika tersedia
            const voices = window.speechSynthesis.getVoices();
            const googleVoice = voices.find(v => v.name.includes("Google Bahasa Indonesia"));
            if (googleVoice) {
                speech.voice = googleVoice;
            }

            window.speechSynthesis.speak(speech);
        }

        // Fungsi Kirim Pesan
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value;
            
            if (!userText) return;

            chatBox.innerHTML += `<p style="color: #94a3b8;"><b>Kamu:</b> ${userText}</p>`;
            input.value = '';

            try {
                // Mengirim prompt sesuai dengan struktur ask.js kamu
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userText }) 
                });
                
                const data = await response.json();
                
                if (data.error) {
                    chatBox.innerHTML += `<p style="color: #ef4444;"><b>Error:</b> ${data.error}</p>`;
                    return;
                }

                const aiResponse = data.response;
                chatBox.innerHTML += `<p style="color: #38bdf8;"><b>ShoreKeeper:</b> ${aiResponse}</p>`;
                
                // Menjalankan fitur suara
                speakResponse(aiResponse);
                
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                console.error("Error:", err);
                chatBox.innerHTML += `<p style="color: #ef4444;">Koneksi ke server gagal.</p>`;
            }
        }

        // Load voices saat aplikasi dibuka
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
