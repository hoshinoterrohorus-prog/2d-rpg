<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Spectre AI</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #334155; padding: 15px; border-radius: 8px; background: #1e293b; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #38bdf8; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .img-result { max-width: 200px; display: block; margin-top: 10px; border-radius: 8px; cursor: zoom-in; }
    </style>
</head>
<body>
    <h2>Spectre AI</h2>
    <div id="chat-box"></div>
    <input type="text" id="imgLink" placeholder="Link gambar untuk dianalisis (opsional)...">
    <input type="text" id="userInput" placeholder="Tanya sesuatu atau 'Cari gambar kucing'...">
    <button onclick="sendMessage()">Kirim</button>

    <script>
        async function sendMessage() {
            const userInput = document.getElementById('userInput').value;
            const imgLink = document.getElementById('imgLink').value;
            const chatBox = document.getElementById('chat-box');
            
            chatBox.innerHTML += `<p><b>Kamu:</b> ${userInput}</p>`;
            
            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: userInput, imageUrl: imgLink })
            });
            
            const data = await res.json();
            let html = `<p><b>ShoreKeeper:</b> ${data.response}</p>`;
            if (data.imageUrl) {
                html += `<a href="${data.imageUrl}" target="_blank"><img src="${data.imageUrl}" class="img-result"></a>`;
            }
            
            chatBox.innerHTML += html;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
